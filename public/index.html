    <!-- ── Viewport & Theme ──────────────────────────────────────── -->

    <!-- ── SEO & Social ──────────────────────────────────────────── -->
    <meta name="description" content="Find unique places to stay with local hosts in 191 countries. Belong anywhere with Airbnb." />
    <meta name="keywords" content="airbnb, vacation rentals, homes, experiences, places" />
    <meta name="author" content="Airbnb Clone" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Airbnb — Vacation Rentals, Cabins, Beach Houses & More" />
    <meta property="og:description" content="Find unique places to stay with local hosts in 191 countries. Belong anywhere with Airbnb." />
    <meta property="og:image"       content="https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?w=1200&q=80" />

    <meta name="twitter:description" content="Find unique places to stay with local hosts in 191 countries." />
    <meta name="twitter:image"       content="https://images.unsplash.com/photo-1499793983690-e29da59ef1c2?w=1200&q=80" />

    <!-- ── Fonts ─────────────────────────────────────────────────── -->
    <!-- Airbnb uses Cereal — closest free alternatives are Plus Jakarta Sans + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- ── PWA Manifest ──────────────────────────────────────────── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Global Styles ─────────────────────────────────────────── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html {
        scroll-behavior: smooth;
        -webkit-text-size-adjust: 100%;
      }

      body {
        margin: 0;
        font-family: 'Plus Jakarta Sans', 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 16px;
        line-height: 1.5;
        color: #222222;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Loading screen shown before React mounts */
      #root:empty::before {
        content: '';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        z-index: 9999;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #dddddd; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }

      /* Focus ring that matches Airbnb style */
      :focus-visible {
        outline: 2px solid #FF385C;
        outline-offset: 2px;
      }

      /* Smooth image loading */
      img {
        display: block;
        max-width: 100%;
      }

      /* Remove default button styles */
      button { font-family: inherit; }

      /* Selection colour */
      ::selection {
        background-color: #FFD6DC;
        color: #222222;
      }
    </style>

    <title>Airbnb — Vacation Rentals, Cabins, Beach Houses & More</title>
  </head>
